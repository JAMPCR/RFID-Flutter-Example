name: zebra_rfid_sdk
description: "Flutter Plugin for Zebra RFID SDK"
version: 1.0.0+1
homepage:

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.zebra.zebra_rfid_sdk
        pluginClass: ZebraRfidSdkPlugin
      ios:
        pluginClass: ZebraRfidSdkPlugin
